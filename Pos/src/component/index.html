<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBAC Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --bg-hover: #475569;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --border-color: #334155;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr 260px;
            height: 100vh;
            gap: 1px;
            background: var(--border-color);
        }

        /* Panel Base Styles */
        .panel {
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        /* Search Box */
        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            opacity: 0.5;
        }

        /* Button Styles */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-glow);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-ghost:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .btn-sm {
            padding: 6px 10px;
            font-size: 12px;
        }

        /* Resources Panel */
        .resources-panel {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, #1a2234 100%);
        }

        .add-resource-btn {
            width: 100%;
            margin-top: 12px;
        }

        .resources-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .module-section {
            margin-bottom: 8px;
        }

        .module-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 13px;
        }

        .module-header:hover {
            background: var(--bg-hover);
        }

        .module-header.active {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-primary);
        }

        .module-toggle {
            font-size: 10px;
            transition: transform 0.2s;
        }

        .module-section.collapsed .module-toggle {
            transform: rotate(-90deg);
        }

        .module-resources {
            padding-left: 28px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .module-section.collapsed .module-resources {
            max-height: 0;
            opacity: 0;
        }

        .resource-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.2s;
            position: relative;
        }

        .resource-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .resource-item.selected {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2), transparent);
            color: var(--accent-primary);
            border-left: 3px solid var(--accent-primary);
        }

        .resource-menu {
            opacity: 0;
            transition: opacity 0.2s;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .resource-item:hover .resource-menu {
            opacity: 1;
        }

        .resource-menu:hover {
            background: var(--bg-tertiary);
        }

        /* Permissions Panel */
        .permissions-panel {
            background: var(--bg-primary);
            position: relative;
        }

        .top-bar {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-select {
            padding: 6px 10px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
        }

        .resource-info {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .resource-title {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .resource-module-tag {
            font-size: 11px;
            padding: 4px 10px;
            background: var(--accent-primary);
            color: white;
            border-radius: 20px;
            font-weight: 500;
        }

        .permissions-container {
            flex: 1;
            overflow: auto;
            padding: 20px;
        }

        .permissions-table-wrapper {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .permissions-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .permissions-table th {
            background: var(--bg-tertiary);
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .permissions-table th.role-header {
            text-align: center;
            min-width: 100px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .permissions-table th.role-header:hover {
            background: var(--bg-hover);
        }

        .permissions-table th.role-header.highlighted {
            background: rgba(139, 92, 246, 0.3);
            color: var(--text-primary);
        }

        .permissions-table th.role-header.system {
            background: rgba(239, 68, 68, 0.1);
        }

        .permissions-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .permissions-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .permissions-table td.action-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .delete-row-btn {
            opacity: 0;
            transition: opacity 0.2s;
            cursor: pointer;
            color: var(--accent-danger);
            font-size: 16px;
        }

        .permissions-table tr:hover .delete-row-btn {
            opacity: 1;
        }

        .checkbox-cell {
            text-align: center;
        }

        .custom-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            background: var(--bg-primary);
        }

        .custom-checkbox:hover {
            border-color: var(--accent-primary);
        }

        .custom-checkbox.checked {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .custom-checkbox.checked::after {
            content: "✓";
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .custom-checkbox.disabled {
            background: var(--bg-tertiary);
            border-color: var(--bg-hover);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .custom-checkbox.disabled.checked {
            background: var(--accent-success);
            border-color: var(--accent-success);
            opacity: 0.6;
        }

        .add-permission-row {
            padding: 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* Roles Panel */
        .roles-panel {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, #1a2234 100%);
        }

        .roles-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .role-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            margin-bottom: 6px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .role-item:hover {
            background: var(--bg-hover);
            border-color: var(--border-color);
        }

        .role-item.active {
            background: rgba(139, 92, 246, 0.15);
            border-color: var(--accent-secondary);
        }

        .role-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-success);
            box-shadow: 0 0 8px var(--accent-success);
        }

        .role-indicator.inactive {
            background: var(--text-muted);
            box-shadow: none;
        }

        .role-indicator.system {
            background: var(--accent-warning);
            box-shadow: 0 0 8px var(--accent-warning);
        }

        .role-info {
            flex: 1;
        }

        .role-name {
            font-weight: 500;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .role-lock {
            font-size: 11px;
        }

        .role-status {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .role-menu {
            opacity: 0;
            transition: opacity 0.2s;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
        }

        .role-item:hover .role-menu {
            opacity: 1;
        }

        .role-menu:hover {
            background: var(--bg-tertiary);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.error {
            border-color: var(--accent-danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .toast.success {
            border-color: var(--accent-success);
            background: rgba(16, 185, 129, 0.1);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 420px;
            border: 1px solid var(--border-color);
            transform: scale(0.95);
            transition: transform 0.3s;
        }

        .modal-overlay.show .modal {
            transform: scale(1);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .modal-desc {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--bg-hover);
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .skeleton {
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-hover) 50%, var(--bg-tertiary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Context Menu */
        .context-menu {
            position: absolute;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px;
            min-width: 140px;
            box-shadow: var(--shadow-lg);
            z-index: 100;
            display: none;
        }

        .context-menu.show {
            display: block;
        }

        .context-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .context-item:hover {
            background: var(--bg-hover);
        }

        .context-item.danger {
            color: var(--accent-danger);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .app-container {
                grid-template-columns: 260px 1fr 220px;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="app-container">
        <!-- Resources Panel -->
        <div class="panel resources-panel">
            <div class="panel-header">
                <div class="panel-title">Resources</div>
                <div class="search-box">
                    <input type="text" id="resourceSearch" placeholder="Search resources...">
                </div>
                <button class="btn btn-primary btn-sm add-resource-btn" onclick="showAddResourceModal()">
                    <span>+</span> Add Resource
                </button>
            </div>
            <div class="resources-list" id="resourcesList">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Permissions Panel -->
        <div class="panel permissions-panel">
            <div class="top-bar">
                <div class="filter-group">
                    <span class="filter-label">Module</span>
                    <select class="filter-select" id="moduleFilter">
                        <option value="">All Modules</option>
                    </select>
                </div>
                <div class="filter-group">
                    <span class="filter-label">Role</span>
                    <select class="filter-select" id="roleFilter">
                        <option value="">All Roles</option>
                    </select>
                </div>
            </div>

            <div class="resource-info" id="resourceInfo">
                <div class="resource-title">
                    Select a resource
                    <span class="resource-module-tag" style="display: none;">-</span>
                </div>
            </div>

            <div class="permissions-container">
                <div class="permissions-table-wrapper">
                    <table class="permissions-table" id="permissionsTable">
                        <thead>
                            <tr>
                                <th>Action</th>
                                <th class="role-header" data-role="BUYER">BUYER</th>
                                <th class="role-header" data-role="VENDOR">VENDOR</th>
                                <th class="role-header" data-role="SERVICE_PROVIDER">SERVICE_PROVIDER</th>
                                <th class="role-header" data-role="PARTNER">PARTNER</th>
                                <th class="role-header system" data-role="ADMIN">🔒 ADMIN</th>
                                <th class="role-header system" data-role="SUPPORT">🔒 SUPPORT</th>
                            </tr>
                        </thead>
                        <tbody id="permissionsBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                    <div class="add-permission-row" id="addPermissionRow" style="display: none;">
                        <select class="filter-select" id="newActionSelect">
                            <option value="">Select action...</option>
                            <option value="list">list</option>
                            <option value="view">view</option>
                            <option value="create">create</option>
                            <option value="update">update</option>
                            <option value="delete">delete</option>
                            <option value="manage">manage</option>
                            <option value="export">export</option>
                        </select>
                        <button class="btn btn-primary btn-sm" onclick="addPermission()">Add Permission</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Roles Panel -->
        <div class="panel roles-panel">
            <div class="panel-header">
                <div class="panel-title">Roles</div>
                <button class="btn btn-primary btn-sm" onclick="showAddRoleModal()" style="width: 100%;">
                    <span>+</span> Add Role
                </button>
            </div>
            <div class="roles-list" id="rolesList">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toastIcon">⚠️</span>
        <span id="toastMessage">Message</span>
    </div>

    <!-- Add Resource Modal -->
    <div class="modal-overlay" id="addResourceModal">
        <div class="modal">
            <div class="modal-title">Add New Resource</div>
            <div class="modal-desc">Create a new resource to manage permissions.</div>
            <div class="form-group">
                <label class="form-label">Resource Name</label>
                <input type="text" class="form-input" id="newResourceName" placeholder="e.g., product_review">
            </div>
            <div class="form-group">
                <label class="form-label">Module</label>
                <input type="text" class="form-input" id="newResourceModule" placeholder="e.g., catalog">
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <input type="text" class="form-input" id="newResourceDesc" placeholder="Brief description...">
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="hideModal('addResourceModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveResource()">Create Resource</button>
            </div>
        </div>
    </div>

    <!-- Add Role Modal -->
    <div class="modal-overlay" id="addRoleModal">
        <div class="modal">
            <div class="modal-title">Add New Role</div>
            <div class="modal-desc">Define a new role in the system.</div>
            <div class="form-group">
                <label class="form-label">Role Name</label>
                <input type="text" class="form-input" id="newRoleName" placeholder="e.g., MANAGER">
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <input type="text" class="form-input" id="newRoleDesc" placeholder="Role description...">
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="hideModal('addRoleModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveRole()">Create Role</button>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div class="context-menu" id="contextMenu">
        <div class="context-item" onclick="editCurrentItem()">✏️ Edit</div>
        <div class="context-item danger" onclick="deleteCurrentItem()">🗑️ Delete</div>
    </div>

    <script>
        // Data
        const modules = {
            catalog: ['product', 'category', 'brand'],
            rfq: ['rfq', 'quote', 'negotiation'],
            orders: ['product_order', 'service_order', 'invoice'],
            users: ['user', 'profile', 'settings']
        };

        const roles = [
            { id: 'BUYER', name: 'BUYER', status: 'active', system: false },
            { id: 'VENDOR', name: 'VENDOR', status: 'active', system: false },
            { id: 'SERVICE_PROVIDER', name: 'SERVICE_PROVIDER', status: 'active', system: false },
            { id: 'PARTNER', name: 'PARTNER', status: 'active', system: false },
            { id: 'ADMIN', name: 'ADMIN', status: 'system', system: true },
            { id: 'SUPPORT', name: 'SUPPORT', status: 'system', system: true }
        ];

        let selectedResource = null;
        let selectedRole = null;
        let contextMenuTarget = null;
        let contextMenuType = null;

        // Sample permissions data
        const permissionsData = {
            product: {
                list: { BUYER: true, VENDOR: true, SERVICE_PROVIDER: true, PARTNER: true, ADMIN: true, SUPPORT: true },
                view: { BUYER: true, VENDOR: true, SERVICE_PROVIDER: true, PARTNER: true, ADMIN: true, SUPPORT: true },
                create: { BUYER: false, VENDOR: true, SERVICE_PROVIDER: false, PARTNER: false, ADMIN: true, SUPPORT: false },
                update: { BUYER: false, VENDOR: true, SERVICE_PROVIDER: false, PARTNER: false, ADMIN: true, SUPPORT: false },
                delete: { BUYER: false, VENDOR: true, SERVICE_PROVIDER: false, PARTNER: false, ADMIN: true, SUPPORT: false }
            },
            category: {
                list: { BUYER: true, VENDOR: true, SERVICE_PROVIDER: false, PARTNER: true, ADMIN: true, SUPPORT: true },
                view: { BUYER: true, VENDOR: true, SERVICE_PROVIDER: false, PARTNER: true, ADMIN: true, SUPPORT: true },
                create: { BUYER: false, VENDOR: false, SERVICE_PROVIDER: false, PARTNER: false, ADMIN: true, SUPPORT: false },
                update: { BUYER: false, VENDOR: false, SERVICE_PROVIDER: false, PARTNER: false, ADMIN: true, SUPPORT: false },
                delete: { BUYER: false, VENDOR: false, SERVICE_PROVIDER: false, PARTNER: false, ADMIN: true, SUPPORT: false }
            },
            rfq: {
                list: { BUYER: true, VENDOR: true, SERVICE_PROVIDER: false, PARTNER: false, ADMIN: true, SUPPORT: true },
                view: { BUYER: true, VENDOR: true, SERVICE_PROVIDER: false, PARTNER: false, ADMIN: true, SUPPORT: true },
                create: { BUYER: true, VENDOR: false, SERVICE_PROVIDER: false, PARTNER: false, ADMIN: true, SUPPORT: false },
                update: { BUYER: true, VENDOR: true, SERVICE_PROVIDER: false, PARTNER: false, ADMIN: true, SUPPORT: false },
                delete: { BUYER: false, VENDOR: false, SERVICE_PROVIDER: false, PARTNER: false, ADMIN: true, SUPPORT: false }
            }
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderResources();
            renderRoles();
            populateFilters();
            setupEventListeners();
        });

        function renderResources() {
            const container = document.getElementById('resourcesList');
            const searchTerm = document.getElementById('resourceSearch').value.toLowerCase();
            const moduleFilter = document.getElementById('moduleFilter').value;

            container.innerHTML = '';

            Object.entries(modules).forEach(([module, resources]) => {
                if (moduleFilter && module !== moduleFilter) return;

                const filteredResources = resources.filter(r => 
                    r.toLowerCase().includes(searchTerm) || 
                    module.toLowerCase().includes(searchTerm)
                );

                if (filteredResources.length === 0 && searchTerm) return;

                const section = document.createElement('div');
                section.className = 'module-section';
                section.innerHTML = `
                    <div class="module-header" onclick="toggleModule(this)">
                        <span class="module-toggle">▼</span>
                        <span>${module}</span>
                    </div>
                    <div class="module-resources">
                        ${filteredResources.map(r => `
                            <div class="resource-item ${selectedResource === r ? 'selected' : ''}" 
                                 onclick="selectResource('${r}', '${module}')"
                                 oncontextmenu="showContextMenu(event, 'resource', '${r}')">
                                <span>${r}</span>
                                <span class="resource-menu" onclick="event.stopPropagation(); showContextMenu(event, 'resource', '${r}')">⋯</span>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            });

            if (container.children.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📦</div>
                        <div class="empty-title">No resources found</div>
                        <div>Add your first resource to get started</div>
                    </div>
                `;
            }
        }

        function toggleModule(header) {
            header.parentElement.classList.toggle('collapsed');
        }

        function selectResource(resource, module) {
            selectedResource = resource;
            renderResources();

            document.getElementById('resourceInfo').innerHTML = `
                <div class="resource-title">
                    ${resource}
                    <span class="resource-module-tag">${module}</span>
                </div>
            `;

            document.getElementById('addPermissionRow').style.display = 'flex';
            renderPermissions();
        }

        function renderPermissions() {
            const tbody = document.getElementById('permissionsBody');
            const roleFilter = document.getElementById('roleFilter').value;

            if (!selectedResource || !permissionsData[selectedResource]) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7">
                            <div class="empty-state">
                                <div class="empty-icon">🔐</div>
                                <div class="empty-title">No permissions defined</div>
                                <div>Add permissions to manage access control</div>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            const perms = permissionsData[selectedResource];
            tbody.innerHTML = Object.entries(perms).map(([action, rolePerms]) => `
                <tr>
                    <td class="action-cell">
                        <span class="delete-row-btn" onclick="deletePermissionRow('${action}')">🗑️</span>
                        ${action}
                    </td>
                    ${roles.map(role => {
                        const hasPerm = rolePerms[role.id];
                        const isSystem = role.system;
                        const isFiltered = roleFilter && role.id !== roleFilter;
                        return `
                            <td class="checkbox-cell ${isFiltered ? 'filtered-out' : ''}" 
                                style="${isFiltered ? 'opacity: 0.3;' : ''}">
                                <div class="custom-checkbox ${hasPerm ? 'checked' : ''} ${isSystem ? 'disabled' : ''}"
                                     onclick="${isSystem ? '' : `togglePermission('${action}', '${role.id}')`}">
                                </div>
                            </td>
                        `;
                    }).join('')}
                </tr>
            `).join('');
        }

        function togglePermission(action, roleId) {
            if (!permissionsData[selectedResource]) return;

            const current = permissionsData[selectedResource][action][roleId];
            permissionsData[selectedResource][action][roleId] = !current;

            renderPermissions();
            showToast(current ? 'Permission revoked' : 'Permission granted', 'success');

            // Simulate API call
            console.log(`API: ${current ? 'DELETE' : 'POST'} /rbac/role-permissions/${roleId}${current ? '/permId' : ''}`);
        }

        function renderRoles() {
            const container = document.getElementById('rolesList');
            container.innerHTML = roles.map(role => `
                <div class="role-item ${selectedRole === role.id ? 'active' : ''}" 
                     onclick="selectRole('${role.id}')"
                     oncontextmenu="${role.system ? '' : `showContextMenu(event, 'role', '${role.id}')`}">
                    <div class="role-indicator ${role.status}"></div>
                    <div class="role-info">
                        <div class="role-name">
                            ${role.name}
                            ${role.system ? '<span class="role-lock">🔒</span>' : ''}
                        </div>
                        <div class="role-status">${role.status}</div>
                    </div>
                    ${!role.system ? `<span class="role-menu" onclick="event.stopPropagation(); showContextMenu(event, 'role', '${role.id}')">⋯</span>` : ''}
                </div>
            `).join('');
        }

        function selectRole(roleId) {
            selectedRole = selectedRole === roleId ? null : roleId;
            renderRoles();

            // Highlight column
            document.querySelectorAll('.role-header').forEach(th => {
                th.classList.toggle('highlighted', th.dataset.role === selectedRole);
            });
        }

        function populateFilters() {
            const moduleSelect = document.getElementById('moduleFilter');
            Object.keys(modules).forEach(m => {
                moduleSelect.innerHTML += `<option value="${m}">${m}</option>`;
            });

            const roleSelect = document.getElementById('roleFilter');
            roles.forEach(r => {
                roleSelect.innerHTML += `<option value="${r.id}">${r.name}</option>`;
            });
        }

        function setupEventListeners() {
            document.getElementById('resourceSearch').addEventListener('input', renderResources);
            document.getElementById('moduleFilter').addEventListener('change', renderResources);
            document.getElementById('roleFilter').addEventListener('change', () => {
                renderPermissions();
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.context-menu')) {
                    document.getElementById('contextMenu').classList.remove('show');
                }
            });
        }

        // Modal Functions
        function showAddResourceModal() {
            document.getElementById('addResourceModal').classList.add('show');
        }

        function showAddRoleModal() {
            document.getElementById('addRoleModal').classList.add('show');
        }

        function hideModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        function saveResource() {
            const name = document.getElementById('newResourceName').value;
            const module = document.getElementById('newResourceModule').value;

            if (!name || !module) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            if (!modules[module]) {
                modules[module] = [];
            }
            modules[module].push(name);

            hideModal('addResourceModal');
            renderResources();
            showToast('Resource created successfully', 'success');

            // Clear form
            document.getElementById('newResourceName').value = '';
            document.getElementById('newResourceModule').value = '';
            document.getElementById('newResourceDesc').value = '';
        }

        function saveRole() {
            const name = document.getElementById('newRoleName').value;

            if (!name) {
                showToast('Please enter a role name', 'error');
                return;
            }

            roles.push({
                id: name.toUpperCase(),
                name: name.toUpperCase(),
                status: 'active',
                system: false
            });

            hideModal('addRoleModal');
            renderRoles();
            showToast('Role created successfully', 'success');

            document.getElementById('newRoleName').value = '';
            document.getElementById('newRoleDesc').value = '';
        }

        function addPermission() {
            const action = document.getElementById('newActionSelect').value;
            if (!action || !selectedResource) return;

            if (!permissionsData[selectedResource]) {
                permissionsData[selectedResource] = {};
            }

            permissionsData[selectedResource][action] = {
                BUYER: false, VENDOR: false, SERVICE_PROVIDER: false, 
                PARTNER: false, ADMIN: true, SUPPORT: false
            };

            renderPermissions();
            showToast('Permission added', 'success');
            document.getElementById('newActionSelect').value = '';
        }

        function deletePermissionRow(action) {
            if (confirm(`Delete permission "${action}"?`)) {
                delete permissionsData[selectedResource][action];
                renderPermissions();
                showToast('Permission deleted', 'success');
            }
        }

        // Context Menu
        function showContextMenu(e, type, target) {
            e.preventDefault();
            contextMenuType = type;
            contextMenuTarget = target;

            const menu = document.getElementById('contextMenu');
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
            menu.classList.add('show');
        }

        function editCurrentItem() {
            document.getElementById('contextMenu').classList.remove('show');
            showToast('Edit functionality - opens edit modal', 'success');
        }

        function deleteCurrentItem() {
            document.getElementById('contextMenu').classList.remove('show');
            if (confirm(`Are you sure you want to delete this ${contextMenuType}?`)) {
                showToast(`${contextMenuType} deleted`, 'success');
            }
        }

        // Toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            document.getElementById('toastIcon').textContent = type === 'error' ? '❌' : '✅';
            toast.className = `toast ${type} show`;

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Close modals on overlay click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('show');
                }
            });
        });
    </script>
</body>
</html>
